title: SAM Hive Saved via reg.exe
id: tl-cred-sam-01
status: stable
description: Detects direct copy of the SAM registry hive, commonly used for offline password cracking.
author: Jude Hilgendorf
references:
    - https://attack.mitre.org/techniques/T1003/002/
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\reg.exe'
        CommandLine|contains|all:
            - 'save'
            - 'HKLM\SAM'
    condition: selection
level: critical
tags:
    - attack.credential_access
    - attack.t1003.002
falsepositives:
    - Backup tooling explicitly authorized to read SAM.
