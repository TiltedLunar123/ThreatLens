title: sudo Read of /etc/shadow
id: tl-cred-shadow-01
status: stable
description: sudo invocation accessing /etc/shadow, the password hash file.
author: Jude Hilgendorf
references:
    - https://attack.mitre.org/techniques/T1003/008/
logsource:
    product: linux
    service: sudo
detection:
    selection:
        Image|contains: 'sudo'
        CommandLine|contains: '/etc/shadow'
    condition: selection
level: high
tags:
    - attack.credential_access
    - attack.t1003.008
falsepositives:
    - Authorized password audit tooling (chage, pam_tally).
