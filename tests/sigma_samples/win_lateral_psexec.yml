title: PsExec Service Execution
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: stable
level: high
description: Detects execution of PsExec remote execution tool
author: ThreatLens Test
date: 2025/01/15
tags:
    - attack.lateral_movement
    - attack.t1569.002
logsource:
    category: process_creation
    product: windows
detection:
    selection1:
        Image|endswith:
            - '\PsExec.exe'
            - '\PsExec64.exe'
    selection2:
        CommandLine|contains:
            - 'psexec'
            - '\\\\*\cmd.exe'
    condition: selection1 or selection2
falsepositives:
    - Legitimate administration with PsExec
