title: SAM Registry Hive Dump
id: test-002
status: stable
description: Detects attempts to dump the SAM registry hive using reg.exe
author: ThreatLens Test Suite
logsource:
    category: process_creation
    product: windows
detection:
    selection_cmd:
        CommandLine|contains|all:
            - 'reg'
            - 'save'
    selection_target:
        CommandLine|contains:
            - '\sam'
            - '\SAM'
    condition: selection_cmd and selection_target
level: critical
tags:
    - attack.credential_access
    - attack.t1003.002
falsepositives:
    - Legitimate backup procedures
