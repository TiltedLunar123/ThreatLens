name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,evtx]"

      - name: Lint with ruff
        run: ruff check threatlens/ tests/

      - name: Run tests with coverage
        run: pytest tests/ --cov=threatlens --cov-report=term-missing --cov-report=xml -v

      - name: Test CLI entry point
        run: |
          threatlens --help
          threatlens scan sample_data/sample_security_log.json --quiet --no-color

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t threatlens:test .

      - name: Test Docker image
        run: docker run --rm threatlens:test --help
