name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,evtx]"

      - name: Lint with ruff
        run: ruff check threatlens/ tests/

      - name: Type check with mypy
        run: mypy threatlens/

      - name: Run tests with coverage
        run: pytest tests/ --cov=threatlens --cov-report=term-missing --cov-report=xml -v

      - name: Smoke test CLI
        shell: bash
        run: |
          threatlens --version
          threatlens --help
          threatlens scan sample_data/sample_security_log.json --quiet --no-color

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t threatlens:test .

      - name: Test Docker image
        run: docker run --rm threatlens:test --help
